name: Build CloudStream Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build JavHDZProvider.cs3
        run: ./gradlew JavHDZProvider:make

      - name: Upload .cs3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: JavHDZProvider.cs3
          path: JavHDZProvider/build/JavHDZProvider.cs3

      # Tự động copy .cs3 ra thư mục gốc repo để serve trực tiếp qua raw URL
      - name: Copy cs3 to root for direct hosting
        run: cp JavHDZProvider/build/JavHDZProvider.cs3 JavHDZProvider.cs3

      - name: Commit built .cs3 back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: build JavHDZProvider.cs3 [skip ci]"
          file_pattern: "JavHDZProvider.cs3"
